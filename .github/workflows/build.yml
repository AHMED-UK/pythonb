name: Build Python 3.13.14 for Android

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: excedrin/adv:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-v8a
            triple: aarch64-linux-android
            api: 35
          - arch: armeabi-v7a
            triple: armv7a-linux-androideabi
            api: 35
          - arch: x86_64
            triple: x86_64-linux-android
            api: 35
          - arch: x86
            triple: i686-linux-android
            api: 35

    steps:
      - name: Install Build Essentials
        run: |
          apt-get update
          apt-get install -y build-essential pkg-config curl xz-utils

      - name: Download and Extract Python 3.13.14
        run: |
          mkdir python-src
          curl -L https://github.com/zrsx/cpython3/releases/download/v3.13.14/Python-3.13.14.tar.xz -o python.tar.xz
          # Strip-components=1 extracts the contents of the root folder directly into python-src
          tar -xf python.tar.xz -C python-src --strip-components=1

      - name: Build Host Python (Mandatory for Cross-Compile)
        run: |
          mkdir -p python-src/build-host
          cd python-src/build-host
          ../configure --prefix=$(pwd)/install
          make -j$(nproc)
          make install
          echo "HOST_PYTHON=$(pwd)/install/bin/python3.13" >> $GITHUB_ENV

      - name: Cross-Compile Python for Android (${{ matrix.arch }})
        run: |
          cd python-src
          mkdir -p build-android-${{ matrix.arch }}
          cd build-android-${{ matrix.arch }}
          export PKG_CONFIG_PATH="${SYS_LIB_TRIPLE}/pkgconfig:${SYS_LIB64_TRIPLE}/pkgconfig:/system/lib/pkgconfig:/system/lib64/pkgconfig"
          
          # 1. Define Paths based on your structure
          export PREFIX=/opt/python3.13-android/${{ matrix.arch }}
          # Path to architecture-specific libs
          export SYS_LIB_TRIPLE="/system/lib/${{ matrix.triple }}"
          export SYS_LIB64_TRIPLE="/system/lib64/${{ matrix.triple }}"
          export CURSES_CFLAGS="-I/system/include/ncursesw -DNCURSES_WIDECHAR"
          export CURSES_LIBS="-lncursesw -Wl,--enable-new-dtags"
          export PANEL_CFLAGS="-I${SYS_INC}/ncursesw"
          export PANEL_LIBS="-lpanelw -lncursesw"
          export SQLITE3_CFLAGS="-I/system/include"
          export SQLITE3_LIBS="-lsqlite3"
          export LIBQLIBS="-lssl -lcrypto -lz"
          # libffi
          export LIBFFI_CFLAGS="-I/system/include/${{ matrix.triple }}"
          export LIBFFI_LIBS="-L/system/lib/${{ matrix.triple }} -lffi"

          # libxcrypt
          export LIBXCRYPT_CFLAGS="-I/system/include/${{ matrix.triple }}"
          export LIBXCRYPT_LIBS="-L/system/lib/${{ matrix.triple }} -lcrypt"

          # bzip2
          export BZIP2_CFLAGS="-I/system/include/${{ matrix.triple }}"
          export BZIP2_LIBS="-L/system/lib/${{ matrix.triple }} -lbz2"

          # libuuid
          export LIBUUID_CFLAGS="-I/system/include/${{ matrix.triple }}"
          export LIBUUID_LIBS="-L/system/lib/${{ matrix.triple }} -luuid"

          # mpdecimal
          export LIBMPDEC_CFLAGS="-I/system/include/${{ matrix.triple }}"
          export LIBMPDEC_LIBS="-L/system/lib/${{ matrix.triple }} -lmpdec"
          # LZMA (_lzma)
          export LIBLZMA_LIBS="-llzma"
          export _LZMA_CPPFLAGS="-I/system/include/${{ matrix.triple }}"
          export _LZMA_LDFLAGS="-L/system/lib/${{ matrix.triple }} -llzma"
          export LIBLZMA_CFLAGS="$_LZMA_CPPFLAGS"
          export _LZMA_CFLAGS="$_LZMA_CPPFLAGS"
          
          # Readline
          export READLINE_CFLAGS="$CURSES_CFLAGS -I/system/include "
          export READLINE_LIBS="$CURSES_LIBS $(pkg-config --libs readline) -lreadline -lncursesw"
          
          # DBM (using GDBM)
          export GDBM_CFLAGS="-I/system/include"
          export GDBM_LIBS="-lgdbm_compat"
          export LIBS="-landroid_compat $LIBS"

          
          # 2. Setup Toolchain from Docker Image Wrappers
          export CC=${{ matrix.triple }}${{ matrix.api }}-clang
          export CXX=${{ matrix.triple }}${{ matrix.api }}-clang++
          export AR="llvm-ar"
          export AS="$CC"
          export LD="$CC"
          export RANLIB="llvm-ranlib"
          export STRIP="llvm-strip"

          # 3. Configure PKG_CONFIG_PATH
          # We check the triplet-specific folders first
          export PKG_CONFIG_PATH="${SYS_LIB_TRIPLE}/pkgconfig:${SYS_LIB64_TRIPLE}/pkgconfig:/system/lib/pkgconfig:/system/lib64/pkgconfig"

          # 4. Construct LDFLAGS and CPPFLAGS as requested
          # Path for RPATH on the target device
          export LIBPATH_VAR="/system/lib64:/system/lib:${SYS_LIB64_TRIPLE}:${SYS_LIB_TRIPLE}"
          
          export LDFLAGS="-L$SYS_LIB_TRIPLE -L$SYS_LIB64_TRIPLE -L/system/lib -L/system/lib64 -L/system/lib/${{ matrix.arch }} -L/system/lib64/${{ matrix.arch }} -Wl,-rpath=/system/lib -Wl,--enable-new-dtags"
          
          export CPPFLAGS="-I/system/include -I/system/include/ncursesw -DNCURSES_WIDECHAR -I/system/include/uuid"

          # 5. Run Configure
          ../configure \
            --host=${{ matrix.triple }} \
            --build=x86_64-pc-linux-gnu \
            --disable-shared \
            --disable-test-modules \
            --with-system-expat \
            --with-system-libmpdec \
            --without-ensurepip \
            --enable-loadable-sqlite-extensions \
            --with-build-python=$HOST_PYTHON \
            --prefix=$PREFIX \
            --with-openssl=/system \
            --with-openssl-rpath=auto \
            ac_cv_file__dev_ptmx=yes \
            ac_cv_file__dev_ptc=no \
            ac_cv_func_wcsftime=no \
            ac_cv_func_ftime=no \
            ac_cv_func_faccessat=no \
            ac_cv_func_link=no \
            ac_cv_func_linkat=no \
            ac_cv_buggy_getaddrinfo=no \
            ac_cv_little_endian_double=yes \
            ac_cv_posix_semaphores_enabled=yes \
            ac_cv_func_sem_open=yes \
            ac_cv_func_sem_timedwait=yes \
            ac_cv_func_sem_getvalue=yes \
            ac_cv_func_sem_unlink=yes \
            ac_cv_func_shm_open=yes \
            ac_cv_func_shm_unlink=yes \
            ac_cv_working_tzset=yes \
            ac_cv_header_sys_xattr_h=no \
            ac_cv_func_getgrent=yes \
            ac_cv_func_getpwent=no || { cat config.log; exit 1; }

          make -j$(nproc)
          make install

      - name: Package Build Artifacts
        run: |
          cd /opt/python3.13-android/
          tar -czvf python-3.13.14-android-${{ matrix.arch }}.tar.gz ${{ matrix.arch }}
          mv *.tar.gz $GITHUB_WORKSPACE/

      - name: Upload Python Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-3.13.14-android-${{ matrix.arch }}
          path: python-3.13.14-android-${{ matrix.arch }}.tar.gz
