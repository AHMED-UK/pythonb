name: Build Python for Android

on:
  workflow_dispatch:
    inputs:
      py_version:
        description: 'Python Version (e.g., 3.13.14)'
        required: true
        default: '3.13.14'
      py_url:
        description: 'Python Source Tarball URL'
        required: true
        default: 'https://github.com/zrsx/cpython3/releases/download/v3.13.14/Python-3.13.14.tar.xz'

permissions:
  contents: read
  actions: read

env:
  # Force GitHub Actions to use Node 24 for runner execution as per 2026 standards
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: excedrin/adv:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-v8a
            triple: aarch64-linux-android
            api: 35
          - arch: armeabi-v7a
            triple: armv7a-linux-androideabi
            api: 35
          - arch: x86_64
            triple: x86_64-linux-android
            api: 35
          - arch: x86
            triple: i686-linux-android
            api: 35

    steps:
      - name: Install Build Essentials
        run: |
          apt-get update
          apt-get install -y build-essential pkg-config curl xz-utils git libreadline-dev libncurses-dev uuid-dev libffi-dev liblzma-dev bzip2 libbz2-dev sqlite3 libgdbm-dev libsqlite3-dev

      - name: Download and Extract Python
        run: |
          mkdir python-src
          curl -L "${{ github.event.inputs.py_url }}" -o python.tar.xz
          tar -xf python.tar.xz -C python-src --strip-components=1
          
          cd python-src
          # 1. Logical Fix: Remove git metadata inside the source folder
          rm -rf .git || true
          
          # 2. Enhancement: Upgrade C standard from C11 to C17
          # We modify both configure and the Makefile template to ensure it propagates
          sed -i 's/-std=c11/-std=c17/g' configure
          sed -i 's/-std=c11/-std=c17/g' configure.ac
          sed -i 's/-std=c11/-std=c17/g' Makefile.pre.in

      - name: Build Host Python
        run: |
          cd python-src
          mkdir build-host
          cd build-host
          ../configure --prefix=$(pwd)/install
          make -j$(nproc)
          make install
          V_SHORT=$(echo "${{ github.event.inputs.py_version }}" | cut -d. -f1-2)
          echo "HOST_PYTHON=$(pwd)/install/bin/python${V_SHORT}" >> $GITHUB_ENV

      - name: Cross-Compile Python for Android (${{ matrix.arch }})
        run: |
          cd python-src
          mkdir -p build-android-${{ matrix.arch }}
          cd build-android-${{ matrix.arch }}

          # Setup Toolchain
          export CC=${{ matrix.triple }}${{ matrix.api }}-clang
          export CXX=${{ matrix.triple }}${{ matrix.api }}-clang++
          export AR="llvm-ar"
          export NM="llvm-nm"
          export RANLIB="llvm-ranlib"
          export STRIP="llvm-strip"
          export READELF="llvm-readelf"

          # Define Paths
          export PREFIX="$GITHUB_WORKSPACE/python-install/${{ matrix.arch }}"
          export SYS_INC="/system/include"
          export SYS_LIB_ARCH="/system/lib/${{ matrix.arch }}"
          export SYS_LIB_TRIPLE="/system/lib/${{ matrix.triple }}"

          # Environment Variables
          export LDFLAGS="-L${SYS_LIB_TRIPLE} -L${SYS_LIB_ARCH} -L/system/lib64 -L/system/lib -Wl,-rpath=/system/lib -Wl,--enable-new-dtags"
          export CPPFLAGS="-I${SYS_INC} -I${SYS_INC}/ncursesw -I${SYS_INC}/uuid -DNCURSES_WIDECHAR"
          export CFLAGS="-fPIC"
          export LIBS="-landroid_compat"

          export PKG_CONFIG_LIBDIR="${SYS_LIB_TRIPLE}/pkgconfig:${SYS_LIB_ARCH}/pkgconfig:/system/lib/pkgconfig"

          # Module Flags for System Libraries
          export LIBMPDEC_CFLAGS="-I${SYS_INC}"
          export LIBMPDEC_LIBS="-L${SYS_LIB_TRIPLE} -lmpdec"
          export NDBM_CFLAGS="-I${SYS_INC}"
          export NDBM_LIBS="-L${SYS_LIB_TRIPLE} -lgdbm_compat -lgdbm"
          export GDBM_CFLAGS="-I${SYS_INC}"
          export GDBM_LIBS="-L${SYS_LIB_TRIPLE} -lgdbm"
          export LIBREADLINE_CFLAGS="-I${SYS_INC}"
          export LIBREADLINE_LIBS="-L${SYS_LIB_TRIPLE} -lreadline -lncursesw"
          export CURSES_CFLAGS="-I${SYS_INC}/ncursesw -DNCURSES_WIDECHAR"
          export CURSES_LIBS="-L${SYS_LIB_TRIPLE} -lncursesw"
          export LIBUUID_CFLAGS="-I${SYS_INC}/uuid"
          export LIBUUID_LIBS="-L${SYS_LIB_TRIPLE} -luuid"
          export LIBSSL_CFLAGS="-I${SYS_INC}"
          export LIBSSL_LIBS="-L${SYS_LIB_TRIPLE} -lssl -lcrypto"
          export SQLITE3_CFLAGS="-I${SYS_INC}"
          export SQLITE3_LIBS="-L${SYS_LIB_TRIPLE} -lsqlite3"
          export LIBFFI_CFLAGS="-I${SYS_INC}"
          export LIBFFI_LIBS="-L${SYS_LIB_TRIPLE} -lffi"
          export LIBLZMA_CFLAGS="-I${SYS_INC}"
          export LIBLZMA_LIBS="-L${SYS_LIB_TRIPLE} -llzma"
          export BZIP2_CFLAGS="-I${SYS_INC}"
          export BZIP2_LIBS="-L${SYS_LIB_TRIPLE} -lbz2"

          # Configure using Official Termux Overwrites + C17 + System Libs
          ../configure \
            --host=${{ matrix.triple }} \
            --build=x86_64-pc-linux-gnu \
            --prefix=$PREFIX \
            --with-build-python=$HOST_PYTHON \
            --with-system-ffi \
            --with-system-expat \
            --with-system-libmpdec \
            --without-ensurepip \
            --enable-loadable-sqlite-extensions \
            --disable-shared \
            --disable-test-modules \
            --with-dbmliborder=ndbm:gdbm \
            --with-readline=readline \
            --with-openssl=/system \
            --with-openssl-rpath=auto \
            ac_cv_file__dev_ptmx=yes \
            ac_cv_file__dev_ptc=no \
            ac_cv_func_wcsftime=no \
            ac_cv_func_ftime=no \
            ac_cv_func_faccessat=no \
            ac_cv_func_link=no \
            ac_cv_func_linkat=no \
            ac_cv_buggy_getaddrinfo=no \
            ac_cv_little_endian_double=yes \
            ac_cv_posix_semaphores_enabled=yes \
            ac_cv_func_sem_open=yes \
            ac_cv_func_sem_timedwait=yes \
            ac_cv_func_sem_getvalue=yes \
            ac_cv_func_sem_unlink=yes \
            ac_cv_func_shm_open=yes \
            ac_cv_func_shm_unlink=yes \
            ac_cv_working_tzset=yes \
            ac_cv_header_sys_xattr_h=no \
            ac_cv_func_getgrent=yes \
            ac_cv_header_ndbm_h=yes \
            ac_cv_header_gdbm_ndbm_h=no \
            ac_cv_header_gdbm_dash_ndbm_h=no \
            ac_cv_search_dbm_open="-lgdbm_compat -lgdbm" || { tail -n 200 config.log; exit 1; }

          make -j$(nproc)
          make install

      - name: Clean and Package Python Artifacts
        run: |
          PREFIX="$GITHUB_WORKSPACE/python-install/${{ matrix.arch }}"
          V_SHORT=$(echo "${{ github.event.inputs.py_version }}" | cut -d. -f1-2)
          cd "$PREFIX"

          # 1. Fix Shebangs: Replace build-time absolute path with portable /usr/bin/env
          find . -type f -exec sed -i "1s|^#!$PREFIX/bin/python${V_SHORT}|#!/usr/bin/env python${V_SHORT}|" {} +

          # 2. Remove non-Python related things and test suites
          rm -rf lib/python${V_SHORT}/test
          rm -rf lib/python${V_SHORT}/*/test
          rm -rf lib/python${V_SHORT}/*/tests
          find . -name "__pycache__" -type d -exec rm -rf {} +

          # 3. Strip binaries to keep only Python related runtime
          find bin -type f -executable -exec llvm-strip --strip-all {} + || true
          find lib -type f -name "*.so*" -exec llvm-strip --strip-unneeded {} + || true
          find . -type f -empty -delete

          # 4. Create Tarball containing only essential directories
          tar -cJvf "$GITHUB_WORKSPACE/python-${{ github.event.inputs.py_version }}-android-${{ matrix.arch }}.tar.xz" \
            bin lib include share

      - name: Upload Python Artifact
        uses: actions/upload-artifact@v7
        with:
          name: python-${{ github.event.inputs.py_version }}-android-${{ matrix.arch }}
          path: python-${{ github.event.inputs.py_version }}-android-${{ matrix.arch }}.tar.gz
