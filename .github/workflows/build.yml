name: Build Python 3.13.14 for Android

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-24.04
    container:
      image: excedrin/adv:latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: arm64-v8a
            triple: aarch64-linux-android
            api: 35
          - arch: armeabi-v7a
            triple: armv7a-linux-androideabi
            api: 35
          - arch: x86_64
            triple: x86_64-linux-android
            api: 35
          - arch: x86
            triple: i686-linux-android
            api: 35

    steps:
      - name: Install Build Essentials
        run: |
          apt-get update
          apt-get install -y build-essential pkg-config curl xz-utils git

      - name: Download and Extract Python 3.13.14
        run: |
          mkdir python-src
          curl -L https://github.com/zrsx/cpython3/releases/download/v3.13.14/Python-3.13.14.tar.xz -o python.tar.xz
          tar -xf python.tar.xz -C python-src --strip-components=1

      - name: Build Host Python
        run: |
          cd python-src
          mkdir build-host
          cd build-host
          ../configure --prefix=$(pwd)/install
          make -j$(nproc)
          make install
          echo "HOST_PYTHON=$(pwd)/install/bin/python3.13" >> $GITHUB_ENV

      - name: Cross-Compile Python for Android (${{ matrix.arch }})
        run: |
          cd python-src
          mkdir -p build-android-${{ matrix.arch }}
          cd build-android-${{ matrix.arch }}

          # 1. Setup Toolchain
          export CC=${{ matrix.triple }}${{ matrix.api }}-clang
          export CXX=${{ matrix.triple }}${{ matrix.api }}-clang++
          export AR="llvm-ar"
          export NM="llvm-nm"
          export RANLIB="llvm-ranlib"
          export STRIP="llvm-strip"
          export READELF="llvm-readelf"

          # 2. Define Paths based on your specific structure
          export PREFIX="/opt/python3.13-android/${{ matrix.arch }}"
          export SYS_INC="/system/include"
          # Path where you stated landroid_compat exists
          export SYS_LIB_ARCH="/system/lib/${{ matrix.arch }}"
          export SYS_LIB_TRIPLE="/system/lib/${{ matrix.triple }}"

          # 3. Environment Variables
          # Added the specific arch path to LDFLAGS
          export LDFLAGS="-L${SYS_LIB_ARCH} -L${SYS_LIB_TRIPLE} -L/system/lib64 -L/system/lib -Wl,-rpath=/system/lib -Wl,--enable-new-dtags"
          export CPPFLAGS="-I${SYS_INC} -I${SYS_INC}/ncursesw -DNCURSES_WIDECHAR"
          export CFLAGS="-fPIC"
          export LIBS="-landroid_compat"

          # Force pkg-config to look at Android system paths
          export PKG_CONFIG_LIBDIR="${SYS_LIB_TRIPLE}/pkgconfig:${SYS_LIB_ARCH}/pkgconfig:/system/lib/pkgconfig"

          # Module specific flags for Python 3.13 (Termux Style)
          export LIBMPDEC_CFLAGS="-I${SYS_INC}"
          export LIBMPDEC_LIBS="-L${SYS_LIB_ARCH} -lmpdec"
          export LIBSSL_CFLAGS="-I${SYS_INC}"
          export LIBSSL_LIBS="-L${SYS_LIB_ARCH} -lssl -lcrypto"
          export SQLITE3_CFLAGS="-I${SYS_INC}"
          export SQLITE3_LIBS="-L${SYS_LIB_ARCH} -lsqlite3"
          export LIBFFI_CFLAGS="-I${SYS_INC}"
          export LIBFFI_LIBS="-L${SYS_LIB_ARCH} -lffi"
          export LIBLZMA_CFLAGS="-I${SYS_INC}"
          export LIBLZMA_LIBS="-L${SYS_LIB_ARCH} -llzma"
          export BZIP2_CFLAGS="-I${SYS_INC}"
          export BZIP2_LIBS="-L${SYS_LIB_ARCH} -lbz2"

          # 4. Configure
          ../configure \
            --host=${{ matrix.triple }} \
            --build=x86_64-pc-linux-gnu \
            --prefix=$PREFIX \
            --with-build-python=$HOST_PYTHON \
            --disable-shared \
            --disable-test-modules \
            --with-system-expat \
            --with-system-libmpdec \
            --with-system-ffi \
            --without-ensurepip \
            --enable-loadable-sqlite-extensions \
            --with-openssl=/system \
            --with-openssl-rpath=auto \
            ac_cv_file__dev_ptmx=yes \
            ac_cv_file__dev_ptc=no \
            ac_cv_func_wcsftime=no \
            ac_cv_func_ftime=no \
            ac_cv_func_faccessat=no \
            ac_cv_func_link=no \
            ac_cv_func_linkat=no \
            ac_cv_buggy_getaddrinfo=no \
            ac_cv_little_endian_double=yes \
            ac_cv_posix_semaphores_enabled=yes \
            ac_cv_func_sem_open=yes \
            ac_cv_func_sem_timedwait=yes \
            ac_cv_func_sem_getvalue=yes \
            ac_cv_func_sem_unlink=yes \
            ac_cv_func_shm_open=yes \
            ac_cv_func_shm_unlink=yes \
            ac_cv_working_tzset=yes \
            ac_cv_header_sys_xattr_h=no \
            ac_cv_func_getgrent=yes \
            ac_cv_func_getpwent=no || { tail -n 200 config.log; exit 1; }

          make -j$(nproc)
          make install

      - name: Package Build Artifacts
        run: |
          cd /opt/python3.13-android/
          tar -czvf python-3.13.14-android-${{ matrix.arch }}.tar.gz ${{ matrix.arch }}
          mv *.tar.gz $GITHUB_WORKSPACE/

      - name: Upload Python Artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-3.13.14-android-${{ matrix.arch }}
          path: python-3.13.14-android-${{ matrix.arch }}.tar.gz
