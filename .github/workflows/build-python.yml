name: Build Python (Termux)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Tag to create/attach the release to (e.g. v3.13.14-termux)"
        required: true
        default: "v3.13.14-termux"

# Needed to create the GitHub Release and upload assets on this repo (your fork).
permissions:
  contents: write

concurrency:
  group: build-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    # termux-builder image: NDK r29 preinstalled and $NDK exported by the
    # image itself (verified by termux-builder's docker_image_test.yml), plus
    # all host build tools (build-essential, curl, unzip, zstd, pkg-config, ...).
    # build.sh picks the NDK up from $NDK — no path pinned here.
    container:
      image: ghcr.io/crotm/termux-builder:latest
      # Run as root: GitHub mounts the workspace root-owned, and
      # patch_ndk_sysroot needs to write into the NDK sysroot.
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        target_arch: [aarch64, arm, i686, x86_64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache downloads
        uses: actions/cache@v4
        with:
          path: downloads
          key: downloads-${{ matrix.target_arch }}-${{ hashFiles('build.sh') }}

      # No python3.13 in the image; build.sh host-builds one for
      # --with-build-python. Cache it so that only happens once.
      - name: Cache host build-python
        uses: actions/cache@v4
        with:
          path: build-python-*/host-build-prefix
          key: build-python-3.13-${{ hashFiles('build.sh') }}

      - name: Build Python
        env:
          TERMUX_ARCH: ${{ matrix.target_arch }}
        run: |
          chmod +x ./build.sh
          ./build.sh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: python-${{ matrix.target_arch }}
          path: |
            output/*.deb
            output/*.sha256
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true

      - name: List collected files
        run: find dist -type f | sort

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Python for Termux ${{ steps.tag.outputs.tag }}
          body: |
            CPython cross-compiled for Termux with the same toolchain and
            configure flags as termux-packages (NDK r29, API 24).
            Source: pre-patched tarball from zrsx/cpython3.
          files: |
            dist/*.deb
            dist/*.sha256
          fail_on_unmatched_files: true
